<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Game Changer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      max-width: 800px;
      margin: auto;
    }
    h1 { color: #f39c12; text-align: center; }
    .container {
      display: flex;
      gap: 20px;
      justify-content: space-between;
    }
    .fleet-panel {
      background-color: #2d2d2d;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      flex: 1;
    }
    .fleet-a h2 { color: #ff6b6b; margin-top: 0;}
    .fleet-b h2 { color: #4cd137; margin-top: 0;}
    .form-group {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      align-items: center;
    }
    input {
      width: 60px;
      padding: 5px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
      text-align: center;
    }
    .controls { text-align: center; margin: 30px 0; }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #f39c12;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }
    button:hover { background-color: #d68910; }
    #results {
      padding: 20px;
      border: 1px solid #444;
      background-color: #2d2d2d;
      border-radius: 5px;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
<h1>Game Changer</h1>
<p style="text-align: center;">Symulator starć w Eclipse: Drugi Świt Galaktyki</p>

<div class="container">
  <div class="fleet-panel fleet-a">
    <h2>Flota A</h2>
    <div class="form-group"><label>Liczba statków:</label> <input type="number" id="a-count" value="1" min="1"></div>
    <hr style="border-color: #444;">
    <div class="form-group"><label>Wytrzymałość (HP):</label> <input type="number" id="a-hp" value="1" min="1"></div>
    <div class="form-group"><label>Inicjatywa:</label> <input type="number" id="a-init" value="2" min="0"></div>
    <div class="form-group"><label>Komputer (+):</label> <input type="number" id="a-comp" value="0" min="0"></div>
    <div class="form-group"><label>Tarcze (-):</label> <input type="number" id="a-shield" value="0" min="0"></div>
    <div class="form-group"><label>Obrażenia (Dmg):</label> <input type="number" id="a-dmg" value="1" min="1"></div>
  </div>

  <div class="fleet-panel fleet-b">
    <h2>Flota B</h2>
    <div class="form-group"><label>Liczba statków:</label> <input type="number" id="b-count" value="1" min="1"></div>
    <hr style="border-color: #444;">
    <div class="form-group"><label>Wytrzymałość (HP):</label> <input type="number" id="b-hp" value="1" min="1"></div>
    <div class="form-group"><label>Inicjatywa:</label> <input type="number" id="b-init" value="2" min="0"></div>
    <div class="form-group"><label>Komputer (+):</label> <input type="number" id="b-comp" value="1" min="0"></div>
    <div class="form-group"><label>Tarcze (-):</label> <input type="number" id="b-shield" value="0" min="0"></div>
    <div class="form-group"><label>Obrażenia (Dmg):</label> <input type="number" id="b-dmg" value="1" min="1"></div>
  </div>
</div>

<div class="controls">
  <button onclick="runMonteCarlo()">Symuluj 10 000 bitew</button>
</div>

<div id="results">Skonfiguruj statki i kliknij przycisk, aby rozpocząć...</div>

<script src="simulator.js"></script>
</body>
</html>
