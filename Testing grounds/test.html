<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Game Changer</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #121212; color: #e0e0e0; max-width: 1100px; margin: auto; }
    h1 { color: #f39c12; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-style: italic; }
    .container { display: flex; gap: 20px; justify-content: center; }
    .fleet-panel { background-color: #1e1e1e; padding: 20px; border: 2px solid #333; border-radius: 12px; flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .fleet-a { border-color: #ff4757; }
    .fleet-b { border-color: #2ed573; }
    .fleet-a h2 { color: #ff4757; margin-top: 0; }
    .fleet-b h2 { color: #2ed573; margin-top: 0; }
    .role-label { font-size: 12px; text-transform: uppercase; opacity: 0.7; display: block; margin-bottom: 10px; }
    .form-group { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
    input { width: 55px; padding: 6px; background-color: #2c2c2c; color: white; border: 1px solid #444; border-radius: 4px; text-align: center; outline: none; }
    input:focus { border-color: #f39c12; }
    .controls { text-align: center; margin: 30px 0; }
    button { padding: 15px 40px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: all 0.3s; background-color: #f39c12; color: #121212; }
    button:hover { background-color: #e67e22; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); }
    #results { padding: 20px; background-color: #1e1e1e; border-radius: 12px; text-align: center; margin-bottom: 20px; font-size: 22px; border: 1px solid #333; }

    /* Styl logów */
    .logs-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; display: none; }
    .log-column { background-color: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; height: 400px; overflow-y: auto; }
    .log-header { font-weight: bold; color: #f39c12; border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; text-align: center; }
    .log-hit { color: #2ed573; }
    .log-miss { color: #ff4757; }
    .log-death { color: #ffa502; font-weight: bold; background: rgba(255,165,2,0.1); }
    .log-turn { color: #54a0ff; margin-top: 8px; display: block; border-left: 2px solid #54a0ff; padding-left: 5px; }
  </style>
</head>
<body>
<h1>Game Changer</h1>
<div class="subtitle">W przypadku remisu inicjatywy - Obrońca (Flota B) strzela pierwszy.</div>

<div class="container">
  <div class="fleet-panel fleet-a">
    <span class="role-label">Agresor</span>
    <h2>Flota A</h2>
    <div class="form-group"><label>Liczba statków:</label> <input type="number" id="a-count" value="1"></div>
    <hr style="border-color: #333;">
    <div class="form-group"><label>HP:</label> <input type="number" id="a-hp" value="1"></div>
    <div class="form-group"><label>Inicjatywa:</label> <input type="number" id="a-init" value="2"></div>
    <div class="form-group"><label>Komputer (+):</label> <input type="number" id="a-comp" value="0"></div>
    <div class="form-group"><label>Tarcze (-):</label> <input type="number" id="a-shield" value="0"></div>
    <div class="form-group"><label>Liczba kości:</label> <input type="number" id="a-dice" value="1"></div>
    <div class="form-group"><label>Dmg na kość:</label> <input type="number" id="a-dmg" value="1"></div>
  </div>

  <div class="fleet-panel fleet-b">
    <span class="role-label">Obrońca (Bonus Inicjatywy)</span>
    <h2>Flota B</h2>
    <div class="form-group"><label>Liczba statków:</label> <input type="number" id="b-count" value="1"></div>
    <hr style="border-color: #333;">
    <div class="form-group"><label>HP:</label> <input type="number" id="b-hp" value="1"></div>
    <div class="form-group"><label>Inicjatywa:</label> <input type="number" id="b-init" value="2"></div>
    <div class="form-group"><label>Komputer (+):</label> <input type="number" id="b-comp" value="1"></div>
    <div class="form-group"><label>Tarcze (-):</label> <input type="number" id="b-shield" value="0"></div>
    <div class="form-group"><label>Liczba kości:</label> <input type="number" id="b-dice" value="1"></div>
    <div class="form-group"><label>Dmg na kość:</label> <input type="number" id="b-dmg" value="1"></div>
  </div>
</div>

<div class="controls">
  <button onclick="executeAll()">SYMULUJ (20 000 bitew)</button>
</div>

<div id="results">Wyniki pojawią się tutaj...</div>

<div id="logs-area" class="logs-container">
  <div class="log-column" id="log-1"></div>
  <div class="log-column" id="log-2"></div>
  <div class="log-column" id="log-3"></div>
</div>

<script src="test2.js"></script>
</body>
</html>
